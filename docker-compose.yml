services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mini-crm-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    restart: unless-stopped
    volumes:
      - sqlserver_data:/var/opt/mssql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver_data: